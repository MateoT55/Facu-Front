<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Formulario</h1>
    <form action="">
        <legend for="texto">Nombre</legend>
        <input type="text" name="texto">

        <legend for="email">Email</legend>
        <input type="email" name="email">

        <legend for="url">Url</legend>
        <input type="url" name="url">

        <legend for="fecha">Fecha</legend>
        <input type="date" name="fecha">

        <legend for="hora">Hora</legend>
        <input type="time" name="hora">

        <legend for="mes">Mes</legend>
        <input type="month" name="mes">

        <legend for="semana">Semana</legend>
        <input type="week" name="semana">

        <legend for="fecha">Fecha</legend>
        <input type="date" name="fecha">

        <legend for="numero">Fecha</legend>
        <input type="number" name="numero" min="-5" max="5">

        <legend for="color">Color</legend>
        <input type="color" name="color">

        <legend for="pass">Password</legend>
        <input type="password" name="pass">

        <legend for="provincia">Provincia</legend>
        <select name="provincia">
            <option value="buenos_aires">Buenos Aires</option>
            <option value="cordoba" selected>Cordoba</option>
            <option value="santa_fe">Santa Fe</option>
        </select>

        <legend for="domicilio">Domicilio</legend>
        <textarea name="domicilio" rows="5" cols="7"></textarea>

        
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
